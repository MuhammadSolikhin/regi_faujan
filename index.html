<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kalkulator web modern dengan Light Mode dan Dark Mode, desain bergaya smartphone, dan perhitungan real-time." />
  <title>Kalkulator Modern</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light-mode">

  <!-- Calculator Phone Container -->
  <div class="calculator" id="calculator">

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="time" id="clock">17:41</span>
      <div class="status-icons">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><rect x="1" y="6" width="18" height="12" rx="2" ry="2"/><line x1="23" y1="13" x2="23" y2="11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><rect x="2" y="8" width="14" height="8" rx="1" fill="currentColor"/></svg>
      </div>
    </div>

    <!-- Display Area -->
    <div class="display" id="display">
      <div class="display-inner">
        <div class="equation" id="equation" aria-label="Persamaan">0</div>
        <div class="result" id="result" aria-label="Hasil real-time"></div>
      </div>
    </div>

    <!-- Keypad Area -->
    <div class="keypad">

      <!-- Row 1: Control Buttons -->
      <div class="control-row">
        <button class="ctrl-btn" id="btn-history" title="Riwayat" aria-label="Riwayat Perhitungan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-minus" title="Tanda Minus" aria-label="Tanda Minus">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="18" height="18"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-window" title="Mode Layar" aria-label="Mode Layar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        </button>
        <button class="ctrl-btn theme-toggle" id="btn-theme" title="Ganti Tema" aria-label="Toggle Light/Dark Mode">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>

      <!-- Row 2: AC, (), %, ÷ -->
      <div class="operator-row">
        <button class="btn btn-special btn-ac" id="btn-ac" data-value="AC" aria-label="All Clear">AC</button>
        <button class="btn btn-special btn-paren" id="btn-paren" data-value="()" aria-label="Kurung">()</button>
        <button class="btn btn-special btn-percent" id="btn-percent" data-value="%" aria-label="Persen">%</button>
        <button class="btn btn-operator" id="btn-div" data-value="÷" aria-label="Bagi">÷</button>
      </div>

      <!-- Number Pad Card (Rows 3-6) -->
      <div class="numpad-card">

        <!-- Row 3: 7, 8, 9, × -->
        <div class="num-row">
          <button class="btn btn-num" id="btn-7" data-value="7" aria-label="7">7</button>
          <button class="btn btn-num" id="btn-8" data-value="8" aria-label="8">8</button>
          <button class="btn btn-num" id="btn-9" data-value="9" aria-label="9">9</button>
          <button class="btn btn-operator btn-in-numpad" id="btn-mul" data-value="×" aria-label="Kali">×</button>
        </div>

        <!-- Row 4: 4, 5, 6, - -->
        <div class="num-row">
          <button class="btn btn-num" id="btn-4" data-value="4" aria-label="4">4</button>
          <button class="btn btn-num" id="btn-5" data-value="5" aria-label="5">5</button>
          <button class="btn btn-num" id="btn-6" data-value="6" aria-label="6">6</button>
          <button class="btn btn-operator btn-in-numpad" id="btn-sub" data-value="-" aria-label="Kurang">-</button>
        </div>

        <!-- Row 5: 1, 2, 3, + -->
        <div class="num-row">
          <button class="btn btn-num" id="btn-1" data-value="1" aria-label="1">1</button>
          <button class="btn btn-num" id="btn-2" data-value="2" aria-label="2">2</button>
          <button class="btn btn-num" id="btn-3" data-value="3" aria-label="3">3</button>
          <button class="btn btn-operator btn-in-numpad" id="btn-add" data-value="+" aria-label="Tambah">+</button>
        </div>

        <!-- Row 6: +/-, 0, ., = -->
        <div class="num-row">
          <button class="btn btn-num btn-sign" id="btn-sign" data-value="+/-" aria-label="Positif/Negatif">+/-</button>
          <button class="btn btn-num" id="btn-0" data-value="0" aria-label="0">0</button>
          <button class="btn btn-num" id="btn-dot" data-value="." aria-label="Titik Desimal">.</button>
          <button class="btn btn-equals" id="btn-equals" data-value="=" aria-label="Sama Dengan">=</button>
        </div>

      </div><!-- /numpad-card -->

    </div><!-- /keypad -->

    <!-- Home Bar -->
    <div class="home-bar"></div>

  </div><!-- /calculator -->

  <!-- History Modal -->
  <div class="history-overlay" id="history-overlay" aria-hidden="true">
    <div class="history-modal" id="history-modal" role="dialog" aria-label="Riwayat Perhitungan">
      <div class="history-header">
        <h2>Riwayat</h2>
        <button class="history-close" id="history-close" aria-label="Tutup Riwayat">✕</button>
      </div>
      <div class="history-list" id="history-list">
        <p class="history-empty">Belum ada riwayat perhitungan.</p>
      </div>
      <button class="history-clear-btn" id="history-clear">Hapus Semua</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
